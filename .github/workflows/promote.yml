name: Promote to Production

# Manually promotes a ref (default: current main) to production by
# force-moving the prod branch, then dispatching the Pages deploy.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit SHA to promote'
        required: false
        default: 'main'

permissions:
  contents: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # inputs.ref goes through env, never inline ${{ }} interpolation in
      # run: — GitHub expands expressions before the shell parses the line,
      # so quoting cannot prevent script injection from a crafted input.
      - name: Move prod branch to the chosen ref
        env:
          PROMOTE_REF: ${{ inputs.ref }}
        run: git push origin "${PROMOTE_REF}:refs/heads/prod" --force
      # A push made with GITHUB_TOKEN deliberately does NOT trigger
      # `on: push` workflows (GitHub's recursion prevention), so moving
      # the prod branch above will never start the Pages deploy on its
      # own. Dispatch events are the documented exception — trigger the
      # deploy explicitly.
      - name: Trigger the Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main --repo "${GITHUB_REPOSITORY}"
